name: p2p_node
description: P2P decentralized chat — HEX.TEAM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Crypto ────────────────────────────────────────────────────────────────
  cryptography: ^2.7.0
  crypto: ^3.0.3
  convert: ^3.1.1

  # ── Persistence ───────────────────────────────────────────────────────────
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # ── Networking / discovery ────────────────────────────────────────────────
  bonsoir: ^5.1.2
  network_info_plus: ^6.0.1

  # ── File picker (native OS dialog) ───────────────────────────────────────
  # Linux: sudo apt-get install libgtk-3-dev
  file_picker: ^8.0.3

  # ── WebRTC ────────────────────────────────────────────────────────────────
  flutter_webrtc: ^0.9.47

  # ── Utilities ────────────────────────────────────────────────────────────
  uuid: ^4.4.0

  # ── UI ────────────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.9
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/